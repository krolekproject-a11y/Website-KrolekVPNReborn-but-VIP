<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KrolekVPNReborn — Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'Inter', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 40%, rgba(255, 165, 0, 0.2), rgba(0,0,0,0.9) 70%);
            animation: pulseBg 6s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes pulseBg {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        .login-container {
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255, 215, 0, 0.15);
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 48px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-top: 6px;
        }

        .logo h1 span {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            color: #888;
            font-size: 14px;
            margin-top: 4px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 24px 0;
            color: #555;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 20px;
            border-radius: 14px;
            border: none;
            background: #0088cc;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            width: 100%;
            text-decoration: none;
        }

        .btn-social:hover {
            background: #0099dd;
            transform: scale(1.01);
        }

        .btn-social:active {
            transform: scale(0.97);
        }

        .btn-social svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .footer-text {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 24px;
        }

        .footer-text a {
            color: #ffd700;
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1a1a1a;
            border-left: 4px solid #ffd700;
            border-radius: 12px;
            padding: 12px 20px;
            text-align: center;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            color: #fff;
            max-width: 400px;
            margin: 0 auto;
        }

        .toast.show {
            opacity: 1;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
        }

        .hidden-vip-block {
            display: none;
        }

        /* ===== Telegram кнопка ===== */
        .btn-telegram {
            background: #0088cc;
        }

        .btn-telegram:hover {
            background: #0099dd;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">👑</div>
            <h1>Krolek<span>VPN</span></h1>
            <p>Стабильное соединение с мировыми ресурсами</p>
        </div>

        <div class="social-buttons">
            <!-- Telegram -->
            <button class="btn-social btn-telegram" id="btnTelegram">
                <svg viewBox="0 0 24 24">
                    <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
                </svg>
                Войти через Telegram
            </button>
        </div>

        <div class="footer-text">
            Продолжая, вы принимаете <a href="#">условия использования</a>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- ========================================================== -->
    <!-- СКРЫТЫЙ БЛОК — VIP-КОНФИГ                                 -->
    <!-- ========================================================== -->
    <div class="hidden-vip-block" style="display:none;">
        <div id="vipConfig" data-vip="
            H4sIAAAAAAAA/6tWKkktVtJRKkktVlJQyi1WUkrNS85PTMpJVChPLS7JL8pVKMlXSMxLUUjOL1LIT1MoT8xTKEpVSM5PSU1RSK1QSM7JzEtXyE2F8PJTEjPzgIpApOIL0pWS84sUivMzc1KLSzLz80D6kmDqE4sUchLLEnNSc1IhJqUkh9QW5ZeVQq2EOnJBKVmhqCQzt7gktagYpBaqpBgkCFdZBBUFACpxYagCAAAA
        "></div>
    </div>

    <script>
        // ============================================================
        // 1. РАСШИФРОВКА VIP-КОНФИГА
        // ============================================================
        function decodeVipConfig() {
            const encoded = document.getElementById('vipConfig')?.dataset?.vip || '';
            if (!encoded) return null;

            try {
                const binary = atob(encoded);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i) ^ 0x7F;
                }
                const decompressed = pako.inflate(bytes, { to: 'string' });
                return JSON.parse(decompressed);
            } catch (e) {
                console.warn('VIP config decode error:', e);
                return null;
            }
        }

        function loadPako() {
            return new Promise((resolve) => {
                if (window.pako) { resolve(window.pako); return; }
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js';
                script.onload = () => resolve(window.pako);
                script.onerror = () => {
                    console.warn('pako load failed, using fallback');
                    resolve(null);
                };
                document.head.appendChild(script);
            });
        }

        // ============================================================
        // 2. ЛОГИКА ВХОДА ЧЕРЕЗ TELEGRAM
        // ============================================================
        const BOT_TOKEN = '8992196646:AAFW46eoYJVYIX0HqPpWUOxT4bKFsV4bPbI';
        const BOT_USERNAME = 'Krolek_VPN_Reborn_bot';

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function handleTelegramLogin() {
            showToast('⏳ Подключаемся к Telegram...');

            // Генерируем уникальный код
            const loginCode = Date.now().toString(36) + Math.random().toString(36).substr(2, 6);

            // Отправляем уведомление админу
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: '7232337396',
                    text: `🔑 Новый запрос на вход через Telegram\nКод: ${loginCode}\nВремя: ${new Date().toLocaleString()}`
                })
            })
            .then(() => {
                // Открываем бота
                window.location.href = `https://t.me/${BOT_USERNAME}?start=auth_${loginCode}`;
            })
            .catch(() => {
                // Fallback
                window.location.href = `https://t.me/${BOT_USERNAME}`;
            });
        }

        document.getElementById('btnTelegram').addEventListener('click', handleTelegramLogin);

        // ============================================================
        // 3. ПРОВЕРКА ПАРАМЕТРОВ ПРИ ЗАГРУЗКЕ
        // ============================================================
        document.addEventListener('DOMContentLoaded', async function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');

            if (code && code.startsWith('auth_')) {
                showToast('✅ Вход подтверждён!');

                await loadPako();
                const vipConfig = decodeVipConfig();
                if (vipConfig) {
                    console.log('VIP config loaded:', vipConfig);
                }

                setTimeout(() => {
                    window.location.href = `https://t.me/${BOT_USERNAME}`;
                }, 1000);
            }
        });

        // ============================================================
        // 4. TELEGRAM WEB APP
        // ============================================================
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            const user = tg.initDataUnsafe?.user;
            if (user) {
                const container = document.querySelector('.login-container');
                const welcomeMsg = document.createElement('div');
                welcomeMsg.style.cssText = `
                    text-align: center;
                    color: #ffd700;
                    font-size: 14px;
                    margin-bottom: 16px;
                    padding: 12px;
                    background: rgba(255,215,0,0.08);
                    border-radius: 12px;
                    border: 1px solid rgba(255,215,0,0.1);
                `;
                welcomeMsg.innerHTML = `👋 Добро пожаловать, ${user.first_name}!<br><span style="color:#888;font-size:12px;">Нажмите на кнопку ниже для входа</span>`;
                container.insertBefore(welcomeMsg, container.firstChild);
            }
        }
    </script>
</body>
</html>
